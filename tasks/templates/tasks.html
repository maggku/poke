<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tasks</title>
</head>
<body>
{% block content %}
{% for task in tasks %}
    <p>
        <a href="{% url 'email_detail' email_id=task.email.id %}">{{ task.description }}</a>
    </p>
{% endfor %}
{% endblock %}

</body>
</html>
